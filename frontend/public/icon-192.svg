  <!-- Texto UNO -->
  <text x="96" y="108" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" fill="#DC2626" letter-spacing="-1">UNO</text>
  <!-- Puntos decorativos esquinas -->
